:root {
  /* Core palette */
  --ld-turquoise: #0D4036;
  --ld-turquoise-2: #1B4F44;
  --ld-black: #131313;
  --ld-grey: #E6EBEA;
  --ld-white: #FFFFFF;

  /* Expressive accents — use sparingly */
  --ld-accent-green: #00FF6A;
  --ld-accent-mint: #B1FFAC;
  --ld-accent-lime: #50FF47;
  --ld-accent-cyan: #3FC9E6;

  /* Functional */
  --ld-good: #00FF6A;
  --ld-warn: #E6A700;
  --ld-bad: #D64545;
  --ld-grey-text: #5B6B66;
  --ld-border: #C7D2CE;

  --ld-font: "Rethink Sans", Arial, Helvetica, sans-serif;
}

body {
  font-family: var(--ld-font);
  font-weight: 400;
  color: var(--ld-black);
  background: var(--ld-white);
  margin: 0;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

h1, h2, h3, h4 { font-weight: 700; color: var(--ld-turquoise); line-height: 1.15; margin: 0 0 0.4em; }
h1 { font-size: 2.6rem; }
h2 { font-size: 1.9rem; }
h3 { font-size: 1.35rem; }
.subtle { color: var(--ld-grey-text); font-weight: 500; }

/* The wordmark — never all-caps. */
.ld-wordmark { font-weight: 700; letter-spacing: -0.01em; color: var(--ld-turquoise); }
.bg-turquoise .ld-wordmark, .ld-hero .ld-wordmark { color: var(--ld-white); }

/* Surfaces */
.bg-turquoise { background: var(--ld-turquoise); color: var(--ld-white); }
.bg-turquoise h1, .bg-turquoise h2, .bg-turquoise h3 { color: var(--ld-white); }
.bg-grey { background: var(--ld-grey); }

.accent { color: var(--ld-accent-green); }
.chip {
  display: inline-block; padding: 0.15em 0.7em; border-radius: 999px;
  background: var(--ld-accent-green); color: var(--ld-black);
  font-weight: 500; font-size: 0.85rem;
}

/* Tables */
table { border-collapse: collapse; width: 100%; font-size: 0.95rem; }
thead th {
  background: var(--ld-turquoise); color: var(--ld-white);
  text-align: left; padding: 0.6em 0.8em; font-weight: 700;
}
tbody td { padding: 0.55em 0.8em; border-bottom: 1px solid var(--ld-border); }
tbody tr:nth-child(even) { background: var(--ld-grey); }

/* RAG status dots */
.rag { display: inline-block; width: 0.8em; height: 0.8em; border-radius: 50%; }
.rag-good { background: var(--ld-good); }
.rag-warn { background: var(--ld-warn); }
.rag-bad  { background: var(--ld-bad); }

/* Hero / cover */
.ld-hero {
  background: var(--ld-turquoise); color: var(--ld-white);
  padding: 4rem 3.5rem; position: relative; overflow: hidden;
}
.ld-hero h1 { color: var(--ld-white); font-size: 3.4rem; }

/* Dot-grid motif (brand decoration). Place inside a dark surface. */
.dot-grid {
  --dot: var(--ld-accent-green);
  width: 120px; height: 80px;
  background-image: radial-gradient(var(--dot) 2px, transparent 2px);
  background-size: 20px 20px;
  opacity: 0.9;
}

/* Print / PDF */
@media print {
  @page { margin: 16mm; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* Livedin Host Performance — self-serve app styles (uses brand.css tokens) */
*{box-sizing:border-box}
#app{max-width:1200px;margin:0 auto;padding:0 16px 70px;font-family:var(--ld-font);color:var(--ld-black)}
.appbar{background:var(--ld-turquoise);color:#fff;margin:0 -16px 0;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.appbar .wm{font-size:22px;font-weight:700;letter-spacing:-.02em}
.appbar .tag{font-size:12px;opacity:.82}
.dotrow{height:8px;background-image:radial-gradient(var(--ld-accent-green) 1.4px,transparent 1.4px);background-size:12px 8px;opacity:.9;margin-top:6px;width:96px}
.filters{position:sticky;top:0;z-index:30;background:#fff;border-bottom:1px solid var(--ld-border);padding:12px 0;margin-bottom:18px;display:flex;flex-wrap:wrap;gap:10px 14px;align-items:flex-end}
.fld{display:flex;flex-direction:column;gap:3px}
.fld label{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--ld-grey-text);font-weight:700}
select{font-family:inherit;font-size:13px;padding:7px 8px;border:1px solid var(--ld-border);border-radius:7px;background:#fff;min-width:130px;max-width:230px}
.cb{position:relative;min-width:180px}
.cb-in{width:100%;font-family:inherit;font-size:13px;padding:7px 9px;border:1px solid var(--ld-border);border-radius:7px;background:#fff}
.cb-in:focus{outline:2px solid var(--ld-turquoise);outline-offset:-1px}
.cb-list{position:absolute;top:calc(100% + 3px);left:0;right:0;max-height:260px;overflow-y:auto;background:#fff;border:1px solid var(--ld-border);border-radius:8px;box-shadow:0 8px 24px rgba(13,64,54,.16);z-index:60}
.cb-opt{padding:7px 10px;font-size:13px;cursor:pointer;font-variant-numeric:tabular-nums}
.cb-opt:hover,.cb-opt.hi{background:#dff3ec}
.cb-opt.on{background:#eafaf3;font-weight:600;color:var(--ld-turquoise-2)}
.cb-opt.on:hover{background:#dff3ec}
.cb-all{border-bottom:1px solid var(--ld-border);font-weight:600;color:var(--ld-turquoise-2);position:sticky;top:0;background:#fff}
.cb-all.on{background:#eafaf3}
.lbl-hint{font-size:9px;font-weight:600;color:var(--ld-turquoise-2);background:#eafaf3;border-radius:6px;padding:1px 5px;margin-left:4px;text-transform:none;letter-spacing:0}
.cb-empty{padding:8px 10px;font-size:12px;color:var(--ld-grey-text)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chipbtn{font-size:11px;padding:6px 10px;border:1px solid var(--ld-border);border-radius:999px;background:#fff;cursor:pointer;font-weight:500}
.chipbtn:hover{border-color:var(--ld-turquoise)}
.chipbtn.on{background:var(--ld-turquoise);color:#fff;border-color:var(--ld-turquoise)}
.spacer{flex:1}
.btn{font-family:inherit;font-size:12px;padding:8px 13px;border-radius:7px;border:1px solid var(--ld-turquoise);background:var(--ld-turquoise);color:#fff;cursor:pointer;font-weight:600}
.btn.ghost{background:#fff;color:var(--ld-turquoise-2)}
h2.view-title{font-size:20px;color:var(--ld-turquoise);margin:2px 0 2px}
.crumb{font-size:12px;color:var(--ld-grey-text);margin-bottom:12px}
.crumb a{color:var(--ld-turquoise-2);font-weight:600;cursor:pointer;text-decoration:none}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:6px 0 20px}
.kpi{border:1px solid var(--ld-border);border-radius:10px;padding:12px 14px;background:#fff}
.kpi .l{font-size:10px;text-transform:uppercase;letter-spacing:.03em;color:var(--ld-grey-text);font-weight:700}
.kpi .v{font-size:27px;font-weight:700;color:var(--ld-turquoise);line-height:1.12}
.kpi .s{font-size:11px;color:var(--ld-grey-text);min-height:14px}
.delta{font-weight:700}
.up{color:#0a7a3f}.down{color:#b0403f}
.grid2{display:grid;grid-template-columns:1.05fr .95fr;gap:20px;align-items:start}
.card{background:#fff}
.card h3,.sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--ld-turquoise-2);margin:0 0 8px;border-bottom:2px solid var(--ld-grey);padding-bottom:4px}
.sec{margin-top:20px}
table{border-collapse:collapse;width:100%;font-size:12.5px}
thead th{background:var(--ld-turquoise);color:#fff;text-align:left;padding:6px 9px;font-size:11px;font-weight:700}
tbody td{padding:5px 9px;border-bottom:1px solid var(--ld-border)}
tbody tr:nth-child(even){background:var(--ld-grey)}
.num{text-align:right;font-variant-numeric:tabular-nums}
tr.click{cursor:pointer}
tr.click:hover td{background:#dff3ec}
.heat table{font-size:10.5px}
.heat td{padding:3px 5px;border:2px solid #fff;text-align:center;color:#131313}
.heat th{padding:4px;font-size:10px;text-align:center;background:var(--ld-turquoise);color:#fff}
.heat td.u{background:#fff;text-align:left;font-weight:500;border-color:var(--ld-border)}
.bmark{font-size:8px;background:#E6EBEA;color:#5B6B66;padding:0 4px;border-radius:6px}
.ins{padding-left:18px;margin:0}
.ins li{font-size:12.5px;margin-bottom:5px}
.rev-big{font-size:28px;font-weight:700;color:var(--ld-turquoise);line-height:1}
.muted{color:var(--ld-grey-text);font-size:11px}
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;background:#fffbe9;border:1px solid #E6A700;color:#b98900;font-weight:600}
.foot{margin-top:28px;border-top:1px solid var(--ld-border);padding-top:10px;font-size:10px;color:var(--ld-grey-text);line-height:1.5}
.empty{padding:40px;text-align:center;color:var(--ld-grey-text)}
.cmt{width:100%;min-height:88px;font-family:inherit;font-size:13px;line-height:1.5;padding:10px 12px;border:1.5px dashed var(--ld-border);border-radius:8px;background:#fbfcfc;resize:vertical;color:var(--ld-black);box-sizing:border-box}
.cmt:focus{outline:2px solid var(--ld-turquoise);outline-offset:-1px;border-style:solid;background:#fff}
.cmt-bar{display:flex;justify-content:space-between;align-items:center;margin-top:6px;gap:10px}
.cmt-pub{border-left:3px solid var(--ld-accent-green);background:var(--ld-grey);padding:8px 12px;border-radius:6px;font-size:13px;white-space:pre-wrap;margin-bottom:8px}
.h3-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.sel-group{display:flex;gap:6px;align-items:center}
.mini-sel{font-family:inherit;font-size:11px;font-weight:500;text-transform:none;letter-spacing:0;padding:3px 6px;border:1px solid var(--ld-border);border-radius:6px;background:#fff;color:var(--ld-turquoise-2)}
.chrow{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:12px}
.chlbl{width:96px;flex:none}
.chbar{flex:1;height:12px;background:var(--ld-grey);border-radius:6px;overflow:hidden}
.chfill{height:100%;background:var(--ld-turquoise);border-radius:6px}
.chval{width:172px;flex:none;text-align:right;color:var(--ld-grey-text);font-variant-numeric:tabular-nums}
.subrow{display:flex;align-items:center;gap:8px;margin:3px 0;font-size:12px}
.sublbl{width:104px;flex:none}
.subbar{flex:1;height:12px;background:var(--ld-grey);border-radius:6px;overflow:hidden}
.subfill{height:100%;border-radius:6px}
.subval{width:38px;flex:none;text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
.ins li{position:relative}
.ins-x{border:none;background:none;color:var(--ld-border);cursor:pointer;font-size:15px;line-height:1;padding:0 4px;margin-left:4px}
.ins-x:hover{color:#b0403f}
.ins-custom{color:var(--ld-turquoise-2)}
.ins-add{display:flex;gap:6px;margin-top:8px}
.ins-in{flex:1;font-family:inherit;font-size:12px;padding:5px 8px;border:1px solid var(--ld-border);border-radius:6px}
@media print{.mini-sel,.ins-x,.ins-add{display:none}}
@media(max-width:760px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}select{max-width:none}}
@media print{.filters,.btn,.appbar .tag{display:none}.appbar{-webkit-print-color-adjust:exact;print-color-adjust:exact}#app{padding-top:8px}}

<script>
/* Livedin Host Performance — client app. Consumes window.DATA (embedded).
 * DATA = { generated, months:[ym], hosts:{id:{name,city,active}}, reviews:{id:{n,avg}},
 *          fact:[{h,u,t,ym,n,g,cl,di,o,mg,hs,f}] }  (t = 'exact'|'base') */
(function () {
  const D = window.DATA, F = D.fact, H = D.hosts, RM = D.reviewsM || {}, BU = D.baseUnits || {}, CM = D.commentary || {}, CH = D.channelM || {}, SUB = D.reviewSub || {};
  // Cap to the last COMPLETE month: the current (in-progress) month is never selectable.
  const CAP = D.lastComplete || D.months[D.months.length - 1];
  const MONTHS = D.months.filter(m => m <= CAP);
  const view = document.getElementById('view'), filters = document.getElementById('filters');
  const money = n => 'SAR ' + Math.round(n || 0).toLocaleString('en-US');
  const pct = x => x == null ? '—' : Math.round(x * 100) + '%';
  const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mLabel = ym => { const [y, m] = ym.split('-'); return MN[+m - 1] + " '" + y.slice(2); };
  const DIM = ym => { const [y, m] = ym.split('-').map(Number); return new Date(y, m, 0).getDate(); };
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c]));
  const hostName = id => (H[id] && H[id].name) || id;

  const hostIds = [...new Set(F.map(r => r.h))].sort((a, b) => hostName(a).localeCompare(hostName(b)));
  const lpsByHost = {}; F.forEach(r => { (lpsByHost[r.h] = lpsByHost[r.h] || new Set()).add(r.u); });

  let st = { from: MONTHS[Math.max(0, MONTHS.length - 6)], to: MONTHS[MONTHS.length - 1], host: '', lps: [], trend: 'rev_occ', trendWin: 'match' };
  let hostCombo, lpCombo;

  function readHash() {
    const p = new URLSearchParams(location.hash.replace(/^#/, ''));
    if (MONTHS.includes(p.get('from'))) st.from = p.get('from');
    if (MONTHS.includes(p.get('to'))) st.to = p.get('to');
    if (p.get('host') && hostIds.includes(p.get('host'))) st.host = p.get('host');
    if (p.get('lp')) st.lps = p.get('lp').split(',').map(s => s.trim()).filter(Boolean);
    if (p.get('trend') && TREND_METRICS[p.get('trend')]) st.trend = p.get('trend');
    if (p.get('twin')) st.trendWin = p.get('twin');
  }
  function writeHash() {
    const p = new URLSearchParams();
    p.set('from', st.from); p.set('to', st.to);
    if (st.host) p.set('host', st.host); if (st.lps.length) p.set('lp', st.lps.join(','));
    if (st.trend && st.trend !== 'rev_occ') p.set('trend', st.trend);
    if (st.trendWin && st.trendWin !== 'match') p.set('twin', st.trendWin);
    try { history.replaceState(null, '', '#' + p.toString()); } catch (e) {}
  }

  // ---- aggregation ----
  const winMonths = (from, to) => MONTHS.filter(m => m >= from && m <= to);
  function priorMonths(from, to) {
    const w = winMonths(from, to).length, endIdx = MONTHS.indexOf(from) - 1;
    if (endIdx < 0 || !w) return [];
    return MONTHS.slice(Math.max(0, endIdx - w + 1), endIdx + 1);

  // lp may be '' (all units), a single unit code, or an array of codes (multi-select).
  function rowsFor(months, host, lp) {
    const ms = new Set(months);
    const uf = (lp && (!Array.isArray(lp) || lp.length)) ? new Set(Array.isArray(lp) ? lp : [lp]) : null;

  function sum(rows) { const a = { n:0,g:0,cl:0,di:0,o:0,mg:0,hs:0,f:0,bk:0 }; rows.forEach(r => { a.n+=r.n;a.g+=r.g;a.cl+=r.cl;a.di+=r.di;a.o+=r.o;a.mg+=r.mg;a.hs+=r.hs;a.f+=r.f;a.bk+=r.bk||0; }); return a; }

  function monthStat(host, lp, m) {

      <div class="sec"><h3>Per-unit ranking — click a unit to drill in</h3>
        <table><thead><tr><th>#</th><th>LP unit</th><th class="num">Nights</th><th class="num">Occ</th><th class="num">Gross</th><th class="num">Host share</th></tr></thead>
        <tbody>${ranked.map((u, i) => `<tr class="click" data-lp="${esc(u.u)}"><td>${i + 1}</td><td>${esc(u.u)}${u.t === 'base' ? ' <span class="bmark">bldg</span>' : ''}</td><td class="num">${u.n}</td><td class="num">${u.occ == null ? '—' : pct(u.occ)}</td><td class="num">${money(u.g)}</td><td class="num">${money(u.hs)}</td></tr>`).join('') || '<tr><td colspan=6 class="muted">No unit revenue in range.</td></tr>'}</tbody></table></div>
      ${selN === 1 ? '' : `<div class="sec"><h3>Occupancy heatmap — unit × month${selN ? ' <span style="text-transform:none;font-weight:400;color:var(--ld-grey-text)">(selected units)</span>' : ''}</h3>${heatmap(host)}</div>`}
      <div class="grid2 sec">
        <div class="card"><h3>Reviews — received in period <span style="text-transform:none;font-weight:400;color:var(--ld-grey-text)">(reference)</span></h3>
          <div style="display:flex;gap:22px;align-items:flex-end;margin-bottom:4px"><div><div class="rev-big">${rw.avg == null ? '—' : rw.avg}</div><div class="muted">avg score, rated</div></div><div><div class="rev-big">${rw.n}</div><div class="muted">reviews in window</div></div></div>
          ${reviewsTrendSVG(rw.series)}
          <div class="muted" style="margin-top:2px">Bars = review count · line = avg score (0–5). Dated by receipt, not stay month — reference only. Themes &amp; red flags (EN/AR) pending the NLP module.</div></div>
        <div class="card"><h3>Auto-generated insights <span style="text-transform:none;font-weight:400;color:var(--ld-grey-text)">— editable</span></h3><ul class="ins" id="ins-list">${insData.items.map((it, i) => `<li>${it.html}<button class="ins-x" data-i="${i}" title="Remove">×</button></li>`).join('')}</ul><div class="ins-add"><input id="ins-in" class="ins-in" placeholder="Add your own insight…" maxlength="220"><button class="btn ghost" id="ins-add-btn">＋ Add</button></div></div>
      </div>
      <div class="sec"><h3>RM / HSM commentary <span style="text-transform:none;font-weight:400;color:var(--ld-grey-text)">— ${esc(hostName(host))} · ${mLabel(st.to)}</span></h3>
        ${pub ? `<div class="cmt-pub"><b>Published in this report:</b> ${esc(pub)}</div>` : ''}
        <textarea id="cmt" class="cmt" placeholder="Revenue Manager / Host Success Manager — add qualitative context (pricing actions, guest issues, one-offs, decisions to note). Saved on this device; use Export to publish it into the shared report for everyone."></textarea>
        <div class="cmt-bar"><span class="muted" id="cmt-status"></span><button class="btn ghost" id="cmt-export">Export commentary (.json)</button></div>
      </div>`;
    view.querySelector('#back').onclick = () => { st.host = ''; st.lps = []; syncControls(); render(); };
    view.querySelectorAll('tr.click').forEach(tr => tr.onclick = () => { st.lps = [tr.dataset.lp]; syncControls(); render(); });
    const clrLp = view.querySelector('#clr-lp'); if (clrLp) clrLp.onclick = () => { st.lps = []; syncControls(); render(); };
    const cmtKey = `ld-cmt:${host}:${st.to}`, ta = view.querySelector('#cmt'), cs = view.querySelector('#cmt-status');
    try { ta.value = localStorage.getItem(cmtKey) || ''; if (ta.value) cs.textContent = 'saved on this device ✓'; } catch (e) {}
    ta.addEventListener('input', () => { try { localStorage.setItem(cmtKey, ta.value); cs.textContent = 'saved on this device ✓'; } catch (e) { cs.textContent = 'not saved — storage blocked here'; } });
    view.querySelector('#cmt-export').onclick = exportCommentary;
    const tsel = view.querySelector('#trend-sel'); if (tsel) tsel.onchange = () => { st.trend = tsel.value; render(); };
    const twsel = view.querySelector('#trend-win'); if (twsel) twsel.onchange = () => { st.trendWin = twsel.value; render(); };
    view.querySelectorAll('.ins-x').forEach(b => b.onclick = () => {
      const it = insData.items[+b.dataset.i];
      try { if (it.src === 'gen') { insData.removed.push(it.key); localStorage.setItem(insData.rmKey, JSON.stringify(insData.removed)); } else { localStorage.setItem(insData.addKey, JSON.stringify(insData.added.filter(x => x !== it.key))); } } catch (e) {}
      render();
    });
    const inEl = view.querySelector('#ins-in'), addBtn = view.querySelector('#ins-add-btn');
    if (addBtn) addBtn.onclick = () => { const v = inEl.value.trim(); if (!v) return; insData.added.push(v); try { localStorage.setItem(insData.addKey, JSON.stringify(insData.added)); } catch (e) {} render(); };
    if (inEl) inEl.addEventListener('keydown', e => { if (e.key === 'Enter') addBtn.click(); });
  }

  function insights(host, ms, K, pK, ranked, rw) {
    const out = [], act = ranked.filter(u => u.g > 0);
    out.push(`${money(K.s.g)} gross across ${act.length} earning unit${act.length === 1 ? '' : 's'} in the ${ms.length}-month window.`);
    if (pK.s.g) { const d = (K.s.g - pK.s.g) / pK.s.g; out.push(`Revenue ${d >= 0 ? 'up' : 'down'} ${Math.abs(Math.round(d * 100))}% vs the previous ${ms.length}-month window.`); }
    if (K.o != null) out.push(`Occupancy ${pct(K.o)}${K.adr != null ? `, ADR ${money(K.adr)}` : ''}.`);
    if (K.s.g) out.push(`Host share is ${pct(K.s.hs / K.s.g)} of gross.`);
    if (act[0]) out.push(`Top unit: ${esc(act[0].u)} at ${money(act[0].g)}${act[0].occ != null ? ` (${pct(act[0].occ)} occ)` : ''}.`);
    const lag = act.filter(u => u.occ != null && u.occ < 0.4);
    if (lag.length) out.push(`${lag.length} unit${lag.length === 1 ? '' : 's'} below 40% occupancy — review pricing/availability.`);
    if (K.s.f) out.push(`<span class="pill">⚠ ${K.s.f} clamped</span> booking-night(s) had an out-of-range revenue value — flag for a data fix.`);
    if (K.s.bk) out.push(`Review-to-booking ratio ${Math.round((rw.n / K.s.bk) * 100)}% — ${rw.n} review${rw.n === 1 ? '' : 's'} received per ${K.s.bk} booking${K.s.bk === 1 ? '' : 's'} this window${rw.avg != null ? `, ${rw.avg} avg` : ''} (reference).`);
    const cm = channelMix(host, ms);
    if (cm.top && cm.totG) out.push(`Top channel: ${esc(cm.top.ch)} — ${Math.round(cm.top.g / cm.totG * 100)}% of revenue (${cm.top.b} booking${cm.top.b === 1 ? '' : 's'}); ${cm.rows.length} channel${cm.rows.length === 1 ? '' : 's'} total.`);
    const sub = SUB[host];
    if (sub && sub.n) { const dims = [['cleanliness', sub.clean], ['accuracy', sub.accuracy], ['check-in', sub.checkin], ['communication', sub.communication], ['location', sub.location], ['value', sub.value]].sort((a, b) => a[1] - b[1]); out.push(`Weakest Airbnb sub-score: ${dims[0][0]} ${dims[0][1].toFixed(2)} — the area to improve.`); }
    return out;
  }

  function foot(ms) {
    document.getElementById('foot').innerHTML =
      `<b>Draft — for RM / HSM review.</b> Source: livedin_main.view_booking_nights (night-grained), realized statuses only (cancelled &amp; no_show excluded). "Gross" = total_revenue (pre-net of OTA commission — confirm with RM). Occupancy = booked nights ÷ (days × physical units) per LP (LP137/Hassan definition; building-level codes use their sub-unit count). All revenue components clamped to [0, gross]. Host→unit map: two-tier (exact→base-LP), ~96% revenue coverage. Reviews dated by receipt, rated only (reference). Data ${MONTHS[0]}–${MONTHS[MONTHS.length - 1]}, generated ${esc(D.generated)}.`;
  }

  // ---- controls ----
  function opt(v, label, sel) { return `<option value="${esc(v)}"${v === sel ? ' selected' : ''}>${esc(label)}</option>`; }
  function makeCombo(mount, cfg) {
    mount.innerHTML = `<input class="cb-in" type="text" autocomplete="off" placeholder="${esc(cfg.placeholder || '')}"><div class="cb-list" hidden></div>`;
    const input = mount.querySelector('.cb-in'), list = mount.querySelector('.cb-list');
    let filtered = [], hi = -1;
    const display = () => { const o = cfg.getOptions().find(x => x.v === cfg.getValue()); return o ? o.label : ''; };
    const draw = () => { list.innerHTML = filtered.length ? filtered.map((o, i) => `<div class="cb-opt${i === hi ? ' hi' : ''}" data-v="${esc(o.v)}">${esc(o.label)}</div>`).join('') : '<div class="cb-empty">No match</div>'; };
    const filter = q => { const opts = cfg.getOptions(); filtered = q ? opts.filter(o => o.label.toLowerCase().includes(q.toLowerCase())) : opts; hi = -1; draw(); };
    const commit = v => { cfg.onSelect(v); input.value = display(); list.hidden = true; };
    input.addEventListener('focus', () => { input.select(); filter(''); list.hidden = false; });
    input.addEventListener('input', () => { filter(input.value); list.hidden = false; });
    input.addEventListener('keydown', e => {
      if (list.hidden) return;
      if (e.key === 'ArrowDown') { hi = Math.min(hi + 1, filtered.length - 1); draw(); list.querySelector('.hi') && list.querySelector('.hi').scrollIntoView({ block: 'nearest' }); e.preventDefault(); }
      else if (e.key === 'ArrowUp') { hi = Math.max(hi - 1, 0); draw(); e.preventDefault(); }
      else if (e.key === 'Enter') { const p = filtered[hi] || filtered[0]; if (p) commit(p.v); e.preventDefault(); }
      else if (e.key === 'Escape') { input.value = display(); list.hidden = true; input.blur(); }
    });
    list.addEventListener('mousedown', e => { const el = e.target.closest('.cb-opt'); if (el) { e.preventDefault(); commit(el.dataset.v); } });
    input.addEventListener('blur', () => setTimeout(() => { list.hidden = true; input.value = display(); }, 130));
    input.value = display();
    return { refresh: () => { input.value = display(); } };
  }
  // Multi-select combobox: type to filter, click rows to toggle, "All units" clears. Panel stays open across picks.
  function makeMultiCombo(mount, cfg) {
    mount.innerHTML = `<input class="cb-in" type="text" autocomplete="off" placeholder="${esc(cfg.placeholder || '')}"><div class="cb-list" hidden></div>`;
    const input = mount.querySelector('.cb-in'), list = mount.querySelector('.cb-list');
    let filtered = [];
    const summary = () => { const s = cfg.getValues(), tot = cfg.getOptions().length; return s.length ? `${s.length} of ${tot} selected` : (cfg.allLabel || 'All'); };
    const draw = () => {
      const sel = new Set(cfg.getValues());
      const all = `<div class="cb-opt cb-all${sel.size === 0 ? ' on' : ''}" data-all="1">${sel.size === 0 ? '◉' : '○'} ${esc(cfg.allLabel || 'All')}</div>`;
      const rows = filtered.length ? filtered.map(o => `<div class="cb-opt${sel.has(o.v) ? ' on' : ''}" data-v="${esc(o.v)}">${sel.has(o.v) ? '☑' : '☐'} ${esc(o.label)}</div>`).join('') : '<div class="cb-empty">No units for this host</div>';
      list.innerHTML = all + rows;
    };
    const filter = q => { const opts = cfg.getOptions(); filtered = q ? opts.filter(o => o.label.toLowerCase().includes(q.toLowerCase())) : opts; draw(); };
    input.addEventListener('focus', () => { input.value = ''; filter(''); list.hidden = false; });
    input.addEventListener('input', () => { filter(input.value); list.hidden = false; });
    input.addEventListener('keydown', e => { if (e.key === 'Escape') { list.hidden = true; input.value = summary(); input.blur(); } });
    // mousedown (before blur) + preventDefault keeps focus so multiple units can be picked without the panel closing.
    list.addEventListener('mousedown', e => {
      const el = e.target.closest('.cb-opt'); if (!el) return; e.preventDefault();
      if (el.dataset.all) cfg.onClear(); else if (el.dataset.v) cfg.onToggle(el.dataset.v);
      filter(input.value);
    });
    input.addEventListener('blur', () => setTimeout(() => { list.hidden = true; input.value = summary(); }, 150));
    input.value = summary();
    return { refresh: () => { if (list.hidden) input.value = summary(); } };
  }
  function buildControls() {
    filters.innerHTML = `
      <div class="fld"><label>From month</label><select id="f-from">${MONTHS.map(m => opt(m, mLabel(m), st.from)).join('')}</select></div>
      <div class="fld"><label>To month</label><select id="f-to">${MONTHS.map(m => opt(m, mLabel(m), st.to)).join('')}</select></div>
      <div class="fld"><label>Window</label><div class="chips" id="f-win">${[['1M',1],['3M',3],['6M',6],['12M',12],['All',0]].map(([l, n]) => `<button class="chipbtn" data-w="${n}">${l}</button>`).join('')}</div></div>
      <div class="fld"><label>Host ID</label><div class="cb" id="f-host"></div></div>
      <div class="fld"><label>LP units <span class="lbl-hint">multi-select</span></label><div class="cb" id="f-lp"></div></div>
      <div class="spacer"></div>
      <button class="btn" onclick="window.print()">Print / Save PDF</button>`;
    const from = filters.querySelector('#f-from'), to = filters.querySelector('#f-to');
    from.onchange = () => { st.from = from.value; if (st.from > st.to) st.to = st.from; syncControls(); render(); };
    to.onchange = () => { st.to = to.value; if (st.to < st.from) st.from = st.to; syncControls(); render(); };
    filters.querySelectorAll('#f-win .chipbtn').forEach(b => b.onclick = () => {
      const n = +b.dataset.w;
      if (n === 0) st.from = MONTHS[0]; else { const ti = MONTHS.indexOf(st.to); st.from = MONTHS[Math.max(0, ti - n + 1)]; }
      syncControls(); render();
    });
    hostCombo = makeCombo(filters.querySelector('#f-host'), {
      placeholder: 'All hosts — type an ID e.g. 82',
      getOptions: () => [{ v: '', label: 'All hosts (portfolio)' }, ...hostIds.map(h => ({ v: h, label: h }))],
      getValue: () => st.host,
      onSelect: v => { st.host = v; st.lps = []; syncControls(); render(); }
    });
    lpCombo = makeMultiCombo(filters.querySelector('#f-lp'), {
      allLabel: 'All units',
      placeholder: 'All units — pick a host first',
      getOptions: () => (st.host ? [...(lpsByHost[st.host] || [])].sort() : []).map(u => ({ v: u, label: u })),
      getValues: () => st.lps,
      onToggle: v => { const i = st.lps.indexOf(v); if (i < 0) st.lps.push(v); else st.lps.splice(i, 1); render(); },
      onClear: () => { st.lps = []; render(); }
    });
    syncControls();
  }
  function syncControls() {
    const from = filters.querySelector('#f-from'), to = filters.querySelector('#f-to');
    if (!from) return;
    from.value = st.from; to.value = st.to;
    if (hostCombo) hostCombo.refresh();
    if (lpCombo) lpCombo.refresh();
    const winLen = winMonths(st.from, st.to).length;
    filters.querySelectorAll('#f-win .chipbtn').forEach(b => { const n = +b.dataset.w; b.classList.toggle('on', (n === 0 && st.from === MONTHS[0]) || (n !== 0 && n === winLen && MONTHS.indexOf(st.to) - MONTHS.indexOf(st.from) + 1 === n)); });
  }

  readHash();
  buildControls();
  render();
})();

</script></body></html>
